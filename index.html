<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>c 8 Марта, любимка</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(#ff9ecf,#fff);
overflow:hidden;
}

h1{
margin-top:80px;
font-size:60px;
color:#d63384;
}

p{
font-size:22px;
}

#game{
margin-top:40px;
font-size:24px;
font-weight:bold;
}

.heart{
position:absolute;
font-size:35px;
cursor:pointer;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.flower{
position:absolute;
font-size:25px;
animation:fall 8s linear infinite;
opacity:0.8;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(100vh);}
}

#surprise{
display:none;
margin-top:30px;
}

img{
width:250px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<h1>С 8 марта, любимка 💐</h1>

<div id="game">
Найди и нажми <b>3 сердечка ❤️</b>
</div>

<div id="surprise">

<h2>Поздравляю тебя!</h2>

<p>
Ты самая красивая девочка на свете, люблю тебя! ❤️
</p>

<img src="photo.jpg" alt="photo">

</div>

<script>

let heartsClicked = 0;
let totalHearts = 3;

function createHeart(){

let heart = document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.addEventListener("click", clickHeart);
heart.addEventListener("touchstart", clickHeart);

function clickHeart(){

heart.remove();
heartsClicked++;

let remaining = totalHearts - heartsClicked;

if(remaining > 0){
document.getElementById("game").innerHTML =
"Осталось " + remaining + " ❤️";
}

if(heartsClicked >= totalHearts){

document.getElementById("game").style.display="none";
document.getElementById("surprise").style.display="block";

}

}

heart.remove();
heartsClicked++;

let remaining = totalHearts - heartsClicked;

if(remaining > 0){
document.getElementById("game").innerHTML =
"Осталось " + remaining + " ❤️";
}

if(heartsClicked >= totalHearts){

document.getElementById("game").style.display="none";
document.getElementById("surprise").style.display="block";

}

}

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,1200);


function createFlower(){

let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),8000);

}

setInterval(createFlower,700);

</script>

</body>
</html>
